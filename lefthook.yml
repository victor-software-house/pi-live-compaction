pre-commit:
  parallel: true
  commands:
    format:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc,md,yml,yaml}"
      run: mise run format
    lint:
      run: mise run lint
    typecheck:
      run: mise run typecheck

commit-msg:
  commands:
    commitlint:
      run: mise run commitlint -- {1}

pre-push:
  parallel: true
  commands:
    lockfile:
      run: pnpm install --lockfile-only --frozen-lockfile
    verify:
      run: mise run verify
